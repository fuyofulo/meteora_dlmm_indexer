services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: dune-project-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: dune_project
      CLICKHOUSE_USER: dune_project
      CLICKHOUSE_PASSWORD: dune_project_pass
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./schema/clickhouse_v2.sql:/docker-entrypoint-initdb.d/01-clickhouse-v2.sql:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  clickhouse_data:
  clickhouse_logs:
